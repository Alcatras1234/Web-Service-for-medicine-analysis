spring:
  application:
    name: demo

  datasource:
    url: jdbc:postgresql://backend_db:5432/back_DB
    username: amogus
    password: 1234
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          batch_size: 200
        order_inserts: true
        order_updates: true

  rabbitmq:
    host: rabbitmq
    port: 5672
    username: guest
    password: guest
    listener:
      simple:
        prefetch: 32

minio:
  access-key: minioadmin
  secret-key: minioadmin
  bucketName: wsi-bucket 
  url: http://localhost:9000
  internalUrl: http://minio:9000

server:
  port: 8080

logging:
  level:
    com.e.demo: DEBUG

jwt:
  secret: "my-super-secret-key-at-least-256-bits-long-for-hs256"
  expiration-ms: 86400000  # 24 часа


inference:
  url: http://inference:8500

# E4: локальный кэш скачанных WSI для tile-сервиса. На него ходит BioFormats.
wsi:
  cache-dir: /tmp/wsi-cache